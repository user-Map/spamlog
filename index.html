<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamLogib Tool - Garena Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="card">
            <div class="header">
                <i class="fas fa-fire-alt logo-icon"></i>
                <h1>SPAM LOGIN TOOL</h1>
                <p>Advanced Garena Token Stress Tester</p>
            </div>

            <div class="input-group">
                <label for="accessToken"><i class="fas fa-key"></i> Access Token</label>
                <input type="text" id="accessToken" placeholder="Dán token của bạn vào đây...">
            </div>

            <div class="controls">
                <button id="startBtn" class="btn btn-start">
                    <i class="fas fa-rocket"></i> BẮT ĐẦU SPAM
                </button>
                <button id="stopBtn" class="btn btn-stop" disabled>
                    <i class="fas fa-stop-circle"></i> DỪNG LẠI
                </button>
            </div>

            <div class="status-panel">
                <div class="status-header">
                    <span>Trạng thái hệ thống:</span>
                    <span id="liveStatus" class="badge">Đang chờ...</span>
                </div>
                <div id="logTerminal" class="terminal">
                    <div class="line">> Sẵn sàng khởi động hệ thống...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
