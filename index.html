<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamLogib Professional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <!-- Phần nội dung chính (Vuốt lên xuống ở đây) -->
        <main class="content">
            <div class="card">
                <div class="header">
                    <h1>SPAM LOGIB v2</h1>
                    <p>Hệ thống điều khiển Token Garena</p>
                </div>

                <div class="input-box">
                    <label>ACCESS TOKEN</label>
                    <textarea id="accessToken" placeholder="Nhập token tại đây..."></textarea>
                </div>

                <div class="actions">
                    <button id="startBtn" class="btn-run">KÍCH HOẠT HỆ THỐNG</button>
                    <button id="stopBtn" class="btn-stop" disabled>DỪNG LẠI</button>
                </div>

                <div class="info-section">
                    <h3>Hướng dẫn:</h3>
                    <ul>
                        <li>Dán Token lấy từ Garena vào ô trên.</li>
                        <li>Nhấn kích hoạt để bắt đầu gửi packet login.</li>
                        <li>Theo dõi trạng thái tại bảng Log bên dưới.</li>
                    </ul>
                </div>
            </div>
        </main>

        <!-- Phần Log nằm cố định ở dưới cùng -->
        <footer class="log-container">
            <div class="log-header">
                <span>Hệ thống Log Real-time</span>
                <span id="status-dot" class="dot"></span>
            </div>
            <div id="logBody" class="log-body">
                <div class="msg">[Hệ thống]: Sẵn sàng...</div>
            </div>
        </footer>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
